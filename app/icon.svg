<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="iconBg" x1="10%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" style="stop-color:#1187F1;stop-opacity:1" />
      <stop offset="55%" style="stop-color:#0071E3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#005BB8;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="iconOrb" cx="32%" cy="28%" r="75%">
      <stop offset="0%" style="stop-color:#FFC56E;stop-opacity:1" />
      <stop offset="55%" style="stop-color:#FF9500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97E00;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="113" fill="url(#iconBg)"/>

  <!-- F monogram: vertical stroke, top bar, mid bar -->
  <rect x="154" y="123" width="56" height="266" rx="28" fill="#FFFFFF"/>
  <rect x="154" y="123" width="195" height="56" rx="28" fill="#FFFFFF"/>
  <rect x="154" y="230" width="148" height="56" rx="28" fill="#FFFFFF" opacity="0.6"/>

  <!-- Wealth orb -->
  <circle cx="343" cy="353" r="36" fill="url(#iconOrb)"/>
</svg>
