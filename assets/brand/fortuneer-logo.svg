<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 130" width="500" height="130">
  <defs>
    <linearGradient id="iconFill3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6D28D9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGold3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FCD34D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07071A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F0B2A;stop-opacity:1" />
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="goldglow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="130" fill="url(#bgGrad)" rx="16"/>

  <!-- Subtle grid -->
  <line x1="0" y1="43" x2="500" y2="43" stroke="#ffffff" stroke-width="0.2" stroke-opacity="0.03"/>
  <line x1="0" y1="87" x2="500" y2="87" stroke="#ffffff" stroke-width="0.2" stroke-opacity="0.03"/>

  <!-- Icon circle container -->
  <circle cx="65" cy="65" r="46" fill="#0D0B28"/>
  <circle cx="65" cy="65" r="46" fill="none" stroke="url(#accentGold3)" stroke-width="1" stroke-opacity="0.3"/>
  <circle cx="65" cy="65" r="40" fill="none" stroke="#6D28D9" stroke-width="0.5" stroke-opacity="0.4"/>

  <!-- Rising bars - strict left to right upward growth -->
  <rect x="38" y="80" width="9" height="9" rx="2.5" fill="url(#iconFill3)" opacity="0.5"/>
  <rect x="52" y="68" width="9" height="21" rx="2.5" fill="url(#iconFill3)" opacity="0.7"/>
  <rect x="66" y="56" width="9" height="33" rx="2.5" fill="url(#iconFill3)" opacity="0.85"/>
  <rect x="80" y="44" width="9" height="45" rx="2.5" fill="url(#iconFill3)"/>

  <!-- Gold arrow above tallest bar (rightmost) -->
  <polygon points="84.5,37 91,48 78,48" fill="url(#accentGold3)" filter="url(#goldglow)"/>

  <!-- Wordmark -->
  <text
    x="128"
    y="74"
    font-family="'Palatino Linotype', 'Palatino', 'Book Antiqua', serif"
    font-size="42"
    font-weight="900"
    letter-spacing="3"
    fill="#EEE8F5"
  >FORT</text>
  <text
    x="256"
    y="74"
    font-family="'Palatino Linotype', 'Palatino', 'Book Antiqua', serif"
    font-size="42"
    font-weight="900"
    letter-spacing="3"
    fill="url(#accentGold3)"
    filter="url(#goldglow)"
  >UNEER</text>

  <!-- Divider -->
  <line x1="128" y1="82" x2="434" y2="82" stroke="url(#accentGold3)" stroke-width="0.6" stroke-opacity="0.35"/>

  <!-- Tagline -->
  <text
    x="128"
    y="100"
    font-family="'Palatino Linotype', 'Palatino', serif"
    font-size="10"
    font-weight="400"
    letter-spacing="7"
    fill="#8B5CF6"
    opacity="0.85"
  >PIONEER YOUR WEALTH</text>
</svg>
